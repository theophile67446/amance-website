<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>

  <!-- Analytics - only load if configured -->
  <script>
    (function () {
      const endpoint = "%VITE_ANALYTICS_ENDPOINT%";
      const websiteId = "%VITE_ANALYTICS_WEBSITE_ID%";

      // Only load analytics if both variables are defined and not empty
      if (endpoint && endpoint !== "%VITE_ANALYTICS_ENDPOINT%" &&
        websiteId && websiteId !== "%VITE_ANALYTICS_WEBSITE_ID%") {
        const script = document.createElement('script');
        script.defer = true;
        script.src = endpoint + '/umami';
        script.setAttribute('data-website-id', websiteId);
        document.body.appendChild(script);
      }
    })();
  </script>
