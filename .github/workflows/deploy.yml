name: Deploy to Infomaniak

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        env:
          NODE_ENV: production
          VITE_APP_ID: amance-prod
          VITE_OAUTH_PORTAL_URL: ""
        run: pnpm build

      - name: Deploy to Infomaniak via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.INFOMANIAK_SSH_HOST }}
          username: ${{ secrets.INFOMANIAK_SSH_USER }}
          password: ${{ secrets.INFOMANIAK_SSH_PASS }}
          port: 22
          script: |
            cd ${{ secrets.INFOMANIAK_APP_PATH }}
            git pull origin main
            pnpm install --frozen-lockfile --prod
            pnpm build
            # Redémarrage de l'application Node.js (selon interface Infomaniak)
            touch tmp/restart.txt 2>/dev/null || true
